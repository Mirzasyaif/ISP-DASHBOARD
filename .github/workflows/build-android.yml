name: Build Android APK

# To enable release builds:
# Add a repository secret named KEYSTORE_BASE64 with your base64-encoded keystore file
# in your GitHub repository settings (Settings → Secrets and variables → Actions)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew
      
    - name: Clear Gradle cache
      run: rm -rf ~/.gradle/caches/
      
    - name: Sync Capacitor
      run: npx cap sync android
      
    - name: Build Debug APK
      run: |
        cd android
        ./gradlew assembleDebug --stacktrace --no-daemon
        
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
        
    - name: Build Release APK (if secrets available)
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        if [ -n "$KEYSTORE_BASE64" ]; then
          echo "$KEYSTORE_BASE64" | base64 --decode > android/keystore.jks
          cd android
          ./gradlew assembleRelease --stacktrace --no-daemon
        else
          echo "Keystore secret not set, skipping release build"
        fi
        
    - name: Upload Release APK
      if: hashFiles('android/app/build/outputs/apk/release/app-release.apk') != ''
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: android/app/build/outputs/apk/release/app-release.apk
        retention-days: 30