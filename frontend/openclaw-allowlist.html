<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Allowlist Management - ISP Dashboard</title>
    <link rel="stylesheet" href="assets/css/output.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <header class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-4">
                    <a href="index.html" class="text-blue-600 hover:text-blue-700">
                        <i class="fas fa-arrow-left text-xl"></i>
                    </a>
                    <div>
                        <h1 class="text-2xl font-bold text-gray-900">OpenClaw Allowlist</h1>
                        <p class="text-sm text-gray-500">Kelola nomor WhatsApp yang diizinkan untuk CS bot</p>
                    </div>
                </div>
                <div class="flex items-center space-x-3">
                    <button onclick="syncAllowlist()" id="syncBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg flex items-center space-x-2">
                        <i class="fas fa-sync-alt"></i>
                        <span>Sync dari Database</span>
                    </button>
                    <button onclick="restartOpenClaw()" id="restartBtn" class="bg-orange-600 hover:bg-orange-700 text-white px-4 py-2 rounded-lg flex items-center space-x-2">
                        <i class="fas fa-redo"></i>
                        <span>Restart OpenClaw</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-200">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-500">Total Nomor</p>
                        <p class="text-3xl font-bold text-gray-900" id="totalCount">0</p>
                    </div>
                    <div class="bg-blue-100 p-3 rounded-full">
                        <i class="fas fa-phone text-blue-600 text-xl"></i>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-200">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-500">Nomor Client</p>
                        <p class="text-3xl font-bold text-gray-900" id="clientCount">0</p>
                    </div>
                    <div class="bg-green-100 p-3 rounded-full">
                        <i class="fas fa-users text-green-600 text-xl"></i>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-200">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-500">Nomor Admin</p>
                        <p class="text-3xl font-bold text-gray-900" id="adminCount">0</p>
                    </div>
                    <div class="bg-purple-100 p-3 rounded-full">
                        <i class="fas fa-user-shield text-purple-600 text-xl"></i>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-200">
            <div class="px-6 py-4 border-b border-gray-200">
                <div class="flex items-center justify-between">
                    <h2 class="text-lg font-semibold text-gray-900">Daftar Nomor yang Diizinkan</h2>
                    <div class="flex items-center space-x-2">
                        <input type="text" id="searchInput" placeholder="Cari nomor atau nama..." 
                            class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                            onkeyup="filterTable()">
                    </div>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">No</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nomor WhatsApp</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nama Client</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Tipe</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200" id="allowlistTable">
                        <!-- Data will be loaded here -->
                    </tbody>
                </table>
            </div>
            <div class="px-6 py-4 border-t border-gray-200 bg-gray-50">
                <p class="text-sm text-gray-500">
                    <i class="fas fa-info-circle mr-1"></i>
                    Nomor yang tidak ada di allowlist akan menerima pesan "pairing code" alih-alih respon CS
                </p>
            </div>
        </div>
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-4 right-4 bg-green-600 text-white px-6 py-3 rounded-lg shadow-lg transform translate-y-20 opacity-0 transition-all duration-300">
        <div class="flex items-center space-x-2">
            <i class="fas fa-check-circle"></i>
            <span id="toastMessage">Success!</span>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3001/api';
        const API_KEY = 'isp_dashboard_api_key_2026';
        const ADMIN_NUMBER = '+6285236022073';

        // Load allowlist on page load
        document.addEventListener('DOMContentLoaded', loadAllowlist);

        async function loadAllowlist() {
            try {
                const response = await fetch(`${API_BASE}/openclaw/allowlist`, {
                    headers: {
                        'X-API-Key': API_KEY
                    }
                });
                
                if (!response.ok) throw new Error('Failed to load allowlist');
                
                const data = await response.json();
                displayAllowlist(data);
            } catch (error) {
                console.error('Error loading allowlist:', error);
                showToast('Gagal memuat allowlist', 'error');
            }
        }

        async function displayAllowlist(data) {
            const allowlist = data.allowFrom || [];
            
            // Update stats
            document.getElementById('totalCount').textContent = allowlist.length;
            document.getElementById('clientCount').textContent = allowlist.filter(n => n !== ADMIN_NUMBER).length;
            document.getElementById('adminCount').textContent = allowlist.filter(n => n === ADMIN_NUMBER).length;
            
            // Get users data to match phone numbers with names
            let users = [];
            try {
                const usersResponse = await fetch(`${API_BASE}/users`, {
                    headers: {
                        'X-API-Key': API_KEY
                    }
                });
                if (usersResponse.ok) {
                    users = await usersResponse.json();
                }
            } catch (error) {
                console.error('Error loading users:', error);
            }
            
            // Build table rows
            const tableBody = document.getElementById('allowlistTable');
            tableBody.innerHTML = '';
            
            allowlist.forEach((phoneNumber, index) => {
                const isAdmin = phoneNumber === ADMIN_NUMBER;
                const user = users.find(u => {
                    let phone = u.phone_number ? u.phone_number.trim() : '';
                    if (!phone.startsWith('+')) phone = '+' + phone;
                    return phone === phoneNumber;
                });
                
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${index + 1}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${phoneNumber}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${user ? (user.name || user.pppoe_username) : '-'}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm">
                        ${isAdmin 
                            ? '<span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-purple-100 text-purple-800">Admin</span>'
                            : '<span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-green-100 text-green-800">Client</span>'
                        }
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm">
                        <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-blue-100 text-blue-800">Active</span>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        }

        async function syncAllowlist() {
            const syncBtn = document.getElementById('syncBtn');
            syncBtn.disabled = true;
            syncBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i><span>Syncing...</span>';
            
            try {
                const response = await fetch(`${API_BASE}/openclaw/allowlist/sync`, {
                    method: 'POST',
                    headers: {
                        'X-API-Key': API_KEY,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (!response.ok) throw new Error('Failed to sync allowlist');
                
                const result = await response.json();
                showToast(`Berhasil sync ${result.count} nomor dari database`);
                
                // Reload allowlist
                await loadAllowlist();
            } catch (error) {
                console.error('Error syncing allowlist:', error);
                showToast('Gagal sync allowlist', 'error');
            } finally {
                syncBtn.disabled = false;
                syncBtn.innerHTML = '<i class="fas fa-sync-alt"></i><span>Sync dari Database</span>';
            }
        }

        async function restartOpenClaw() {
            const restartBtn = document.getElementById('restartBtn');
            restartBtn.disabled = true;
            restartBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i><span>Restarting...</span>';
            
            try {
                const response = await fetch(`${API_BASE}/openclaw/restart`, {
                    method: 'POST',
                    headers: {
                        'X-API-Key': API_KEY,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (!response.ok) throw new Error('Failed to restart OpenClaw');
                
                showToast('OpenClaw berhasil direstart');
            } catch (error) {
                console.error('Error restarting OpenClaw:', error);
                showToast('Gagal restart OpenClaw', 'error');
            } finally {
                restartBtn.disabled = false;
                restartBtn.innerHTML = '<i class="fas fa-redo"></i><span>Restart OpenClaw</span>';
            }
        }

        function filterTable() {
            const input = document.getElementById('searchInput');
            const filter = input.value.toLowerCase();
            const table = document.getElementById('allowlistTable');
            const rows = table.getElementsByTagName('tr');
            
            for (let i = 0; i < rows.length; i++) {
                const cells = rows[i].getElementsByTagName('td');
                let found = false;
                
                for (let j = 0; j < cells.length; j++) {
                    if (cells[j]) {
                        const textValue = cells[j].textContent || cells[j].innerText;
                        if (textValue.toLowerCase().indexOf(filter) > -1) {
                            found = true;
                            break;
                        }
                    }
                }
                
                rows[i].style.display = found ? '' : 'none';
            }
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            
            toastMessage.textContent = message;
            
            if (type === 'error') {
                toast.classList.remove('bg-green-600');
                toast.classList.add('bg-red-600');
            } else {
                toast.classList.remove('bg-red-600');
                toast.classList.add('bg-green-600');
            }
            
            toast.classList.remove('translate-y-20', 'opacity-0');
            
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }
    </script>
</body>
</html>
